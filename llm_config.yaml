# LLM 配置文件 — 全量使用 Claude Opus 4.6 (Vertex AI rawPredict 接口)
#
# 共 5 个可独立配置的组件:
#   generator        — 作为 domain_knowledge / seed_generation / describe_batch 的默认值
#   domain_knowledge — 领域知识生成 (覆盖 generator 的默认值)
#   seed_generation  — 种子公式生成 (覆盖 generator 的默认值)
#   describe_batch   — 公式批量描述 (覆盖 generator 的默认值)
#   selector         — 父本选择
#   mutator          — LLM 变异建议

# generator 的默认配置 (domain_knowledge / seed_generation / describe_batch 未单独指定时使用)
# max_tokens 表示总 token 预算；实际传给 API 的生成上限为 max_tokens - prompt_tokens。
generator:
  mode: requests  # ✅ 使用 requests 模式，避免 OpenAI SDK 的 404 问题
  model: claude-opus-4-6
  base_url: https://llm-gateway.example.com/api/google/v1/publishers/anthropic/models/claude-opus-4-6:rawPredict
  api_key: YOUR_API_KEY
  anthropic_version: vertex-2023-10-16  # Anthropic 必填特殊参数
  temperature: 0.8
  max_tokens: 128000

# 领域知识生成
domain_knowledge:
  temperature: 0.7
  max_tokens: 128000

# 种子公式生成 — 需要创造力，可适当提高 temperature
seed_generation:
  temperature: 0.9
  max_tokens: 128000

# 批量描述
describe_batch:
  temperature: 0.5
  max_tokens: 128000

selector:
  mode: requests  # ✅ 使用 requests 模式
  model: claude-opus-4-6
  base_url: https://llm-gateway.example.com/api/google/v1/publishers/anthropic/models/claude-opus-4-6:rawPredict
  api_key: YOUR_API_KEY
  anthropic_version: vertex-2023-10-16  # Anthropic 必填特殊参数
  temperature: 0.3
  max_tokens: 128000

mutator:
  mode: requests  # ✅ 使用 requests 模式
  model: claude-opus-4-6
  base_url: https://llm-gateway.example.com/api/google/v1/publishers/anthropic/models/claude-opus-4-6:rawPredict
  api_key: YOUR_API_KEY
  anthropic_version: vertex-2023-10-16  # Anthropic 必填特殊参数
  temperature: 0.7
  max_tokens: 128000

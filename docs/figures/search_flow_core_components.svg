<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1460" viewBox="0 0 1680 1460" role="img" aria-labelledby="title desc">
  <title id="title">symregression search flow with circular main loop</title>
  <desc id="desc">An SVG diagram of the symbolic regression workflow. Runtime components are orange, data and state nodes are blue. The main search loop is arranged as a near-circle: Database to LLM Selector to Selected Father to LLM and GP Mutator to Children to Hybrid Optimizer, then through Degeneracy Check back to Database.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#53627a"/>
    </marker>
    <marker id="loopArrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#d64d3f"/>
    </marker>
    <style>
      .bg { fill: #f6f7fb; }
      .panel { fill: #ffffff; stroke: #d8dfeb; stroke-width: 1.5; }
      .loopPanel { fill: #fffdf8; stroke: #e8d9c8; stroke-width: 2; }
      .runtime { fill: #ffe2ba; stroke: #ca852a; stroke-width: 2; }
      .data { fill: #dcebff; stroke: #4f81c7; stroke-width: 2; }
      .dbRect { fill: #dcebff; stroke: #4f81c7; stroke-width: 2; }
      .dbEllipse { fill: #dcebff; stroke: #4f81c7; stroke-width: 2; }
      .softArrow { stroke: #53627a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .guideArrow { stroke: #7c8797; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .mainArrow { stroke: #d64d3f; stroke-width: 4; fill: none; marker-end: url(#loopArrow); }
      .ring { stroke: #f0c6b7; stroke-width: 3; fill: none; stroke-dasharray: 10 8; }
      .title { font: 700 30px 'Arial', 'Helvetica', sans-serif; fill: #1d2a3a; }
      .subtitle { font: 16px 'Arial', 'Helvetica', sans-serif; fill: #58677b; }
      .section { font: 700 18px 'Arial', 'Helvetica', sans-serif; fill: #30415c; }
      .boxTitle { font: 700 20px 'Arial', 'Helvetica', sans-serif; fill: #203047; }
      .boxText { font: 14px 'Arial', 'Helvetica', sans-serif; fill: #30415c; }
      .mini { font: 12px 'Arial', 'Helvetica', sans-serif; fill: #627387; }
      .legendText { font: 14px 'Arial', 'Helvetica', sans-serif; fill: #30415c; }
      .cardTitle { font: 700 20px 'Arial', 'Helvetica', sans-serif; fill: #203047; }
      .cardText { font: 14px 'Arial', 'Helvetica', sans-serif; fill: #30415c; }
      .emph { fill: #d64d3f; font-weight: 700; }
      .centerNote { font: 700 18px 'Arial', 'Helvetica', sans-serif; fill: #a54338; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="1460"/>

  <text class="title" x="60" y="58">symregression 搜索流程图：环形主循环 + 4 个核心组件</text>
  <text class="subtitle" x="60" y="88">橙色表示 run time 组件，蓝色表示数据 / 状态节点。中心搜索主循环改为闭环结构，`Hybrid Optimizer -&gt; Database` 回写链路上单独标出 `Degeneracy Check`。</text>

  <g>
    <rect class="panel" x="1180" y="30" width="440" height="156" rx="18"/>
    <text class="section" x="1210" y="62">图例 Legend</text>
    <rect class="runtime" x="1210" y="84" width="38" height="24" rx="6"/>
    <text class="legendText" x="1260" y="101">Run time component: 执行逻辑、选择、变异、优化、校验</text>
    <rect class="data" x="1210" y="120" width="38" height="24" rx="6"/>
    <text class="legendText" x="1260" y="137">Data / state node: 数据、父节点、子节点、数据库、结果</text>
    <path class="mainArrow" d="M1210 163 L1260 163"/>
    <text class="legendText" x="1274" y="168">中心主循环，表示每一轮 search 的真实闭环</text>
  </g>

  <text class="section" x="60" y="140">初始化与全局调度</text>

  <g>
    <rect class="data" x="60" y="164" width="250" height="94" rx="18"/>
    <text class="boxTitle" x="185" y="196" text-anchor="middle">Dataset / Context</text>
    <text class="boxText" x="185" y="220" text-anchor="middle">SRDataset, equation, variables</text>
    <text class="mini" x="185" y="240" text-anchor="middle">train/test/ood split + task prompt</text>
  </g>

  <g>
    <rect class="runtime" x="380" y="154" width="300" height="114" rx="18"/>
    <text class="boxTitle" x="530" y="188" text-anchor="middle">Generator</text>
    <text class="boxText" x="530" y="212" text-anchor="middle">domain knowledge + seed generation</text>
    <text class="boxText" x="530" y="232" text-anchor="middle">and node description generation</text>
    <text class="mini" x="530" y="252" text-anchor="middle">core component 1</text>
  </g>

  <g>
    <rect class="data" x="740" y="148" width="230" height="64" rx="16"/>
    <text class="boxTitle" x="855" y="174" text-anchor="middle" font-size="18">Domain Knowledge</text>
    <text class="mini" x="855" y="192" text-anchor="middle">formula priors + heuristics</text>
  </g>

  <g>
    <rect class="data" x="740" y="226" width="230" height="74" rx="16"/>
    <text class="boxTitle" x="855" y="254" text-anchor="middle" font-size="18">Seed Pool</text>
    <text class="boxText" x="855" y="276" text-anchor="middle">initial formulas + descriptions</text>
  </g>

  <g>
    <rect class="runtime" x="1030" y="154" width="300" height="114" rx="18"/>
    <text class="boxTitle" x="1180" y="188" text-anchor="middle">main.py -&gt; TreeSearch.run()</text>
    <text class="boxText" x="1180" y="212" text-anchor="middle">assemble components and orchestrate full search</text>
    <text class="boxText" x="1180" y="232" text-anchor="middle">initialize seeds, iterate, collect best result</text>
    <text class="mini" x="1180" y="252" text-anchor="middle">global scheduler</text>
  </g>

  <path class="softArrow" d="M310 211 L380 211"/>
  <path class="softArrow" d="M680 188 L740 180"/>
  <path class="softArrow" d="M680 232 L740 262"/>
  <path class="guideArrow" d="M1180 268 L1180 338"/>
  <path class="guideArrow" d="M970 262 Q740 330 395 462"/>
  <path class="guideArrow" d="M1180 268 Q1090 336 935 418"/>
  <path class="guideArrow" d="M1260 268 Q1395 340 1468 472"/>

  <g>
    <rect class="loopPanel" x="50" y="332" width="1580" height="660" rx="28"/>
    <text class="section" x="80" y="366">中心主循环 Main Loop</text>
    <text class="subtitle" x="80" y="392">核心闭环：<tspan class="emph">Database -&gt; LLM Selector -&gt; Selected Father -&gt; LLM&amp;GP Mutator -&gt; Children -&gt; Hybrid Optimizer -&gt; Degeneracy Check -&gt; Database</tspan></text>
  </g>

  <ellipse class="ring" cx="840" cy="650" rx="450" ry="360"/>
  <text class="centerNote" x="840" y="638" text-anchor="middle">One search iteration</text>
  <text class="subtitle" x="840" y="664" text-anchor="middle">select parent -&gt; mutate structure -&gt; fit constants -&gt; write back to database</text>

  <g>
    <rect class="dbRect" x="140" y="600" width="220" height="100"/>
    <ellipse class="dbEllipse" cx="250" cy="600" rx="110" ry="18"/>
    <ellipse class="dbEllipse" cx="250" cy="700" rx="110" ry="18"/>
    <text class="boxTitle" x="250" y="640" text-anchor="middle">Database</text>
    <text class="boxText" x="250" y="663" text-anchor="middle">EvolutionTree / node store</text>
    <text class="mini" x="250" y="682" text-anchor="middle">all formulas, scores, history</text>
  </g>

  <g>
    <rect class="runtime" x="350" y="335" width="200" height="114" rx="18"/>
    <text class="boxTitle" x="450" y="371" text-anchor="middle">LLM Selector</text>
    <text class="boxText" x="450" y="395" text-anchor="middle">choose simple, diverse,</text>
    <text class="boxText" x="450" y="415" text-anchor="middle">promising parents</text>
    <text class="mini" x="450" y="435" text-anchor="middle">core component 2</text>
  </g>

  <g>
    <rect class="data" x="735" y="260" width="210" height="110" rx="18"/>
    <text class="boxTitle" x="840" y="298" text-anchor="middle">Selected Father</text>
    <text class="boxText" x="840" y="322" text-anchor="middle">chosen parent formula</text>
    <text class="boxText" x="840" y="342" text-anchor="middle">with fitted params + history</text>
  </g>

  <g>
    <rect class="runtime" x="1120" y="350" width="250" height="120" rx="18"/>
    <text class="boxTitle" x="1245" y="388" text-anchor="middle">LLM&amp;GP Mutator</text>
    <text class="boxText" x="1245" y="412" text-anchor="middle">LLM mutation + GP deletion/addition</text>
    <text class="boxText" x="1245" y="432" text-anchor="middle">normalize, dedupe, simplify</text>
    <text class="mini" x="1245" y="452" text-anchor="middle">core component 3</text>
  </g>

  <g>
    <rect class="data" x="1300" y="690" width="200" height="112" rx="18"/>
    <text class="boxTitle" x="1400" y="728" text-anchor="middle">Children</text>
    <text class="boxText" x="1400" y="752" text-anchor="middle">candidate formulas</text>
    <text class="boxText" x="1400" y="772" text-anchor="middle">before scoring</text>
  </g>

  <g>
    <rect class="runtime" x="1035" y="930" width="250" height="118" rx="18"/>
    <text class="boxTitle" x="1160" y="968" text-anchor="middle">Hybrid Optimizer</text>
    <text class="boxText" x="1160" y="992" text-anchor="middle">fit c0, c1, ... on train set</text>
    <text class="boxText" x="1160" y="1012" text-anchor="middle">compute train / test / ood NMSE</text>
    <text class="mini" x="1160" y="1032" text-anchor="middle">core component 4</text>
  </g>

  <g>
    <rect class="runtime" x="620" y="960" width="220" height="94" rx="18"/>
    <text class="boxTitle" x="730" y="996" text-anchor="middle">Degeneracy Check</text>
    <text class="boxText" x="730" y="1020" text-anchor="middle">overfit detection + simplification</text>
    <text class="mini" x="730" y="1040" text-anchor="middle">attached on return path</text>
  </g>

  <path class="mainArrow" d="M308 596 C330 520 370 450 425 420"/>
  <path class="mainArrow" d="M550 356 C620 315 690 295 735 315"/>
  <path class="mainArrow" d="M945 315 C1010 320 1080 340 1120 390"/>
  <path class="mainArrow" d="M1370 430 C1420 500 1435 610 1410 690"/>
  <path class="mainArrow" d="M1400 802 C1370 875 1310 930 1250 970"/>
  <path class="mainArrow" d="M1035 1000 C970 1012 905 1016 840 1010"/>
  <path class="mainArrow" d="M620 1000 C500 975 360 900 285 780"/>
  <path class="mainArrow" d="M285 780 C255 730 245 690 250 718"/>

  <text class="mini" x="278" y="560" text-anchor="middle">tree summary + history</text>
  <text class="mini" x="635" y="282" text-anchor="middle">selected parents</text>
  <text class="mini" x="1035" y="300" text-anchor="middle">father formula</text>
  <text class="mini" x="1392" y="520" text-anchor="middle">LLM suggestions + GP mutations</text>
  <text class="mini" x="1360" y="844" text-anchor="middle">children to evaluate</text>
  <text class="mini" x="930" y="1080" text-anchor="middle">optimized params + scores</text>
  <text class="mini" x="535" y="1098" text-anchor="middle">simplify degenerated expressions, then write back fitted params, mature state, and history</text>

  <g>
    <rect class="runtime" x="110" y="1030" width="330" height="320" rx="22"/>
    <text class="cardTitle" x="140" y="1068">Generator</text>
    <text class="cardText" x="140" y="1104">- 输入：dataset context, variables, task background</text>
    <text class="cardText" x="140" y="1132">- 产出：domain knowledge, seed pool, node descriptions</text>
    <text class="cardText" x="140" y="1160">- 作用：决定搜索从哪里起步，也决定节点如何被解释</text>
    <text class="cardText" x="140" y="1188">- 在初始化时生成 seeds，在搜索中给更优 child 补描述</text>
    <text class="cardText" x="140" y="1216">- 这些描述随后会进入 Selector 的观察上下文</text>
    <text class="mini" x="140" y="1256">对应代码：main.py 装配，src/generator.py 实现</text>
  </g>

  <g>
    <rect class="runtime" x="490" y="1030" width="330" height="320" rx="22"/>
    <text class="cardTitle" x="520" y="1068">Selector</text>
    <text class="cardText" x="520" y="1104">- 读取 Database 中的 tree summary 与 selection history</text>
    <text class="cardText" x="520" y="1132">- 目标：在低误差、低复杂度、结构多样性之间找平衡</text>
    <text class="cardText" x="520" y="1160">- 输出：Selected Father 列表，而不是直接生成新公式</text>
    <text class="cardText" x="520" y="1188">- 决定每一轮预算投给哪些结构方向</text>
    <text class="cardText" x="520" y="1216">- 是搜索调度器，不是评分器</text>
    <text class="mini" x="520" y="1256">对应代码：src/selector.py + EvolutionTree.get_tree_summary()</text>
  </g>

  <g>
    <rect class="runtime" x="870" y="1030" width="330" height="320" rx="22"/>
    <text class="cardTitle" x="900" y="1068">Mutator</text>
    <text class="cardText" x="900" y="1104">- GP 部分：enumerate_deletions / enumerate_additions</text>
    <text class="cardText" x="900" y="1132">- LLM 部分：基于父节点结构提出更跳跃的结构建议</text>
    <text class="cardText" x="900" y="1160">- 统一做 normalize, structural dedupe, simplification</text>
    <text class="cardText" x="900" y="1188">- 输出 Children，真正扩展结构搜索空间</text>
    <text class="cardText" x="900" y="1216">- 是规则搜索与 LLM 搜索的并联层</text>
    <text class="mini" x="900" y="1256">对应代码：src/mutator.py + TreeSearch._generate_candidates()</text>
  </g>

  <g>
    <rect class="runtime" x="1250" y="1030" width="330" height="320" rx="22"/>
    <text class="cardTitle" x="1280" y="1068">Optimizer</text>
    <text class="cardText" x="1280" y="1104">- 通过 Evaluator 调用具体 optimizer 实现</text>
    <text class="cardText" x="1280" y="1132">- 默认 Hybrid: VARPRO + TRF/CMA/DE + L-BFGS-B</text>
    <text class="cardText" x="1280" y="1160">- 目标：在固定结构下，把常数参数拟合到最好</text>
    <text class="cardText" x="1280" y="1188">- 输出：train/test/ood NMSE + fitted params</text>
    <text class="cardText" x="1280" y="1216">- 这些结果沿回写链路返回 Database，形成下一轮搜索上下文</text>
    <text class="mini" x="1280" y="1256">对应代码：src/evaluator.py + src/optimizer/structure.py</text>
  </g>

  <text class="subtitle" x="60" y="1412">文件：symregression/docs/search_flow_core_components.svg</text>
</svg>
